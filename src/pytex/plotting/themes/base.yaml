common:
  figure:
    dpi: 180
    figsize: [7.2, 5.0]
    facecolor: "#ffffff"
    axes_facecolor: "#ffffff"
    grid_alpha: 0.22
  font:
    family: "DejaVu Sans"
    size: 11
    title_size: 13
  colors:
    primary: "#1f3a5f"
    secondary: "#4c956c"
    accent: "#bc6c25"
    background: "#ffffff"
    foreground: "#111111"
  line:
    width: 1.8
  marker:
    size: 36
xrd:
  line_color: "#1f3a5f"
  fill_color: "#dfe7f2"
  peak_color: "#bc6c25"
  annotate_peaks: true
  max_labels: 12
saed:
  background: "#f8fafc"
  spot_color: "#1f3a5f"
  ring_color: "#94a3b8"
  label_color: "#111111"
  spot_scale: 220
  annotate_spots: true
  max_labels: 16
crystal:
  background: "#ffffff"
  atom_alpha: 0.95
  bond_alpha: 0.45
  plane_alpha: 0.28
  lattice_color: "#334155"
  bond_color: "#64748b"
  bond_render_mode: "cylinder"
  bond_radius_scale: 0.22
  bond_surface_resolution: 18
  bond_specular_strength: 0.2
  bond_shininess: 10.0
  plane_color: "#0f766e"
  vector_colors: ["#1d4ed8", "#059669", "#dc2626"]
  atom_radius_scale: 1.0
  bond_radius: 1.2
  cell_color: "#94a3b8"
  cell_alpha: 0.85
  cell_face_alpha: 0.08
  cell_linewidth: 1.0
  atom_render_mode: "sphere"
  atom_surface_resolution: 22
  atom_edgecolor: "#f8fafc"
  atom_edgewidth: 0.15
  atom_specular_strength: 0.28
  atom_shininess: 18.0
  light_direction: [1.0, -0.8, 1.4]
  light_ambient: 0.40
  light_diffuse: 0.72
  light_specular: 0.34
  direction_color: "#2563eb"
  direction_alpha: 0.96
  direction_linewidth: 2.2
  direction_arrow_ratio: 0.14
  direction_label_fontsize: 11
  direction_label_offset_fraction: 0.03
  plane_label_fontsize: 11
  plane_label_offset_fraction: 0.035
  show_axes: false
  show_title: true
  axis_label_color: "#334155"
  hide_grid: true
  pane_alpha: 0.0
spherical:
  boundary_color: "#0f172a"
  boundary_linewidth: 1.15
  net_major_color: "#94a3b8"
  net_minor_color: "#cbd5e1"
  net_major_linewidth: 0.8
  net_minor_linewidth: 0.45
  net_alpha: 0.88
  major_step_deg: 10.0
  minor_step_deg: 2.0
  show_minor_grid: true
  label_color: "#111111"
  label_fontsize: 11
  label_offset: 0.04
  label_bbox_color: "#ffffff"
  label_bbox_alpha: 0.82
  direction_colors: ["#1f3a5f", "#bc6c25", "#4c956c", "#7c3aed"]
  direction_marker: "o"
  direction_size: 88
  direction_linewidth: 1.0
  direction_edgecolor: "#ffffff"
  plane_colors: ["#2563eb", "#dc2626", "#0f766e", "#b45309"]
  plane_trace_linewidth: 1.45
  plane_trace_alpha: 0.95
  plane_pole_marker: "o"
  plane_pole_size: 72
  plane_pole_linewidth: 1.3
  plane_pole_facecolor: "#ffffff"
  symmetry_colors:
    "2": "#e2e8f0"
    "3": "#bfdbfe"
    "4": "#fecaca"
    "6": "#bbf7d0"
  symmetry_size:
    "2": 112
    "3": 128
    "4": 140
    "6": 154
  symmetry_edgecolor: "#0f172a"
  symmetry_linewidth: 1.1
