<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#223241"/>
    </marker>
  </defs>
  <rect width="1180" height="560" fill="#fcfbf7"/>
  <text x="42" y="52" font-size="30" font-family="Georgia, serif" fill="#18212b">Orientation Mapping Semantics</text>
  <text x="42" y="82" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#56616d">
    PyTex fixes orientation meaning as crystal frame → specimen frame. The inverse relationship is separate and must be requested explicitly.
  </text>

  <rect x="48" y="114" width="1084" height="386" rx="26" fill="#fffdf9" stroke="#ddd6ca" stroke-width="1.5"/>

  <g transform="translate(206,314)">
    <text x="-62" y="-144" font-size="24" font-family="Georgia, serif" fill="#21402c">Crystal frame</text>
    <circle cx="0" cy="0" r="4" fill="#1f2937"/>
    <line x1="0" y1="0" x2="118" y2="-8" stroke="#4d7a58" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="-42" y2="-96" stroke="#4d7a58" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="12" y2="118" stroke="#4d7a58" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="128" y="-4" font-size="22" font-family="Georgia, serif" fill="#21402c">a</text>
    <text x="-66" y="-104" font-size="22" font-family="Georgia, serif" fill="#21402c">b</text>
    <text x="18" y="138" font-size="22" font-family="Georgia, serif" fill="#21402c">c</text>
  </g>

  <g transform="translate(592,314)">
    <text x="-86" y="-144" font-size="24" font-family="Georgia, serif" fill="#5b4308">Stored orientation g</text>
    <rect x="-110" y="-76" width="220" height="132" rx="18" fill="#f4e7bf" stroke="#aa8b2d" stroke-width="2"/>
    <text x="-70" y="-26" font-size="28" font-family="Georgia, serif" fill="#5b4308">g : crystal → specimen</text>
    <text x="-62" y="10" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#5b4308">stable public meaning</text>
    <text x="-48" y="40" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#5b4308">not “whichever way fits”</text>
  </g>

  <g transform="translate(964,314)">
    <text x="-76" y="-144" font-size="24" font-family="Georgia, serif" fill="#17324a">Specimen frame</text>
    <circle cx="0" cy="0" r="4" fill="#1f2937"/>
    <line x1="0" y1="0" x2="118" y2="0" stroke="#3f78a4" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="-72" y2="-82" stroke="#3f78a4" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="0" y2="-122" stroke="#3f78a4" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="128" y="6" font-size="22" font-family="Georgia, serif" fill="#17324a">x</text>
    <text x="-100" y="-88" font-size="22" font-family="Georgia, serif" fill="#17324a">y</text>
    <text x="10" y="-130" font-size="22" font-family="Georgia, serif" fill="#17324a">z</text>
  </g>

  <line x1="318" y1="314" x2="482" y2="314" stroke="#223241" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="702" y1="314" x2="854" y2="314" stroke="#223241" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="420" y="292" font-size="18" font-family="Georgia, serif" fill="#223241">maps basis</text>
  <text x="770" y="292" font-size="18" font-family="Georgia, serif" fill="#223241">target frame</text>

  <path d="M876 408 C792 470, 410 470, 318 408" fill="none" stroke="#8c4e4e" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <text x="464" y="486" font-size="20" font-family="Georgia, serif" fill="#7a3636">inverse mapping is g⁻¹ and should stay explicit</text>
</svg>
