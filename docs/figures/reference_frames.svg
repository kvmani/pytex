<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#243342"/>
    </marker>
    <marker id="thin-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6570"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fcfbf7"/>

  <text x="48" y="54" font-size="30" font-family="Georgia, serif" fill="#18212b">PyTex Reference Frames</text>
  <text x="48" y="84" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#56616d">
    Foundational vector-diagram view: crystal, specimen, map, and detector frames are distinct geometric objects with different scientific roles.
  </text>

  <rect x="38" y="112" width="1124" height="286" rx="26" fill="#fffdf9" stroke="#ded7ca" stroke-width="1.5"/>
  <text x="62" y="148" font-size="24" font-family="Georgia, serif" fill="#18212b">1. Orientation maps the crystal basis into the specimen basis</text>
  <text x="62" y="176" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#56616d">
    In the PyTex public model, an orientation is not an anonymous rotation. It is a typed mapping from crystal frame to specimen frame.
  </text>

  <g transform="translate(170,305)">
    <circle cx="0" cy="0" r="4" fill="#1f2937"/>
    <line x1="0" y1="0" x2="110" y2="-18" stroke="#4d7a58" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="-34" y2="-104" stroke="#4d7a58" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="26" y2="112" stroke="#4d7a58" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="120" y="-18" font-size="22" font-family="Georgia, serif" fill="#22412c">a</text>
    <text x="-60" y="-112" font-size="22" font-family="Georgia, serif" fill="#22412c">b</text>
    <text x="34" y="132" font-size="22" font-family="Georgia, serif" fill="#22412c">c</text>
    <text x="-28" y="154" font-size="22" font-family="Georgia, serif" fill="#22412c">Crystal frame</text>
  </g>

  <g transform="translate(512,305)">
    <circle cx="0" cy="0" r="4" fill="#1f2937"/>
    <line x1="0" y1="0" x2="114" y2="-12" stroke="#b8922c" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="-68" y2="-86" stroke="#b8922c" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="0" y2="118" stroke="#b8922c" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="124" y="-12" font-size="22" font-family="Georgia, serif" fill="#5b4308">x</text>
    <text x="-96" y="-92" font-size="22" font-family="Georgia, serif" fill="#5b4308">y</text>
    <text x="10" y="138" font-size="22" font-family="Georgia, serif" fill="#5b4308">z</text>
    <text x="-42" y="154" font-size="22" font-family="Georgia, serif" fill="#5b4308">Specimen frame</text>
  </g>

  <path d="M250 284 C320 220, 370 214, 438 264" fill="none" stroke="#243342" stroke-width="3.5" marker-end="url(#arrow)"/>
  <text x="300" y="228" font-size="20" font-family="Georgia, serif" fill="#243342">orientation g</text>
  <text x="276" y="252" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#56616d">crystal → specimen</text>

  <g transform="translate(828,252)">
    <rect x="0" y="0" width="276" height="104" rx="18" fill="#f6f0de" stroke="#cab889" stroke-width="1.5"/>
    <text x="20" y="34" font-size="21" font-family="Georgia, serif" fill="#28313a">Reading rule</text>
    <text x="20" y="62" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#47515c">
      If an orientation is stored in PyTex, the frame
    </text>
    <text x="20" y="84" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#47515c">
      relationship is part of the stable meaning.
    </text>
  </g>

  <rect x="38" y="426" width="1124" height="286" rx="26" fill="#fffdf9" stroke="#ded7ca" stroke-width="1.5"/>
  <text x="62" y="462" font-size="24" font-family="Georgia, serif" fill="#18212b">2. Map and detector frames are separate geometric domains</text>
  <text x="62" y="490" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#56616d">
    EBSD scan layout, specimen axes, and diffraction geometry are related, but they are not interchangeable coordinate systems.
  </text>

  <g transform="translate(148,626)">
    <rect x="0" y="0" width="210" height="54" rx="10" fill="#f3f6fb" stroke="#7d8ea3" stroke-width="1.5"/>
    <text x="28" y="34" font-size="22" font-family="Georgia, serif" fill="#243342">Map frame origin</text>
    <circle cx="102" cy="-28" r="4" fill="#1f2937"/>
    <line x1="102" y1="-28" x2="194" y2="-28" stroke="#8f4f4f" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="102" y1="-28" x2="102" y2="-116" stroke="#8f4f4f" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="204" y="-28" font-size="22" font-family="Georgia, serif" fill="#6b2f2f">scan x</text>
    <text x="114" y="-122" font-size="22" font-family="Georgia, serif" fill="#6b2f2f">scan y</text>

    <g transform="translate(8,-8)">
      <line x1="118" y1="-20" x2="118" y2="-144" stroke="#d6c7c7" stroke-width="1.2"/>
      <line x1="58" y1="-20" x2="58" y2="-144" stroke="#d6c7c7" stroke-width="1.2"/>
      <line x1="178" y1="-20" x2="178" y2="-144" stroke="#d6c7c7" stroke-width="1.2"/>
      <line x1="58" y1="-144" x2="178" y2="-144" stroke="#d6c7c7" stroke-width="1.2"/>
      <line x1="58" y1="-84" x2="178" y2="-84" stroke="#d6c7c7" stroke-width="1.2"/>
      <line x1="58" y1="-24" x2="178" y2="-24" stroke="#d6c7c7" stroke-width="1.2"/>
      <circle cx="58" cy="-144" r="4.5" fill="#c84a4a"/>
      <circle cx="118" cy="-144" r="4.5" fill="#c84a4a"/>
      <circle cx="178" cy="-144" r="4.5" fill="#c84a4a"/>
      <circle cx="58" cy="-84" r="4.5" fill="#c84a4a"/>
      <circle cx="118" cy="-84" r="4.5" fill="#c84a4a"/>
      <circle cx="178" cy="-84" r="4.5" fill="#c84a4a"/>
      <circle cx="58" cy="-24" r="4.5" fill="#c84a4a"/>
      <circle cx="118" cy="-24" r="4.5" fill="#c84a4a"/>
      <circle cx="178" cy="-24" r="4.5" fill="#c84a4a"/>
    </g>
  </g>

  <g transform="translate(574,628)">
    <rect x="0" y="0" width="214" height="54" rx="10" fill="#f6f3fb" stroke="#8a7aa4" stroke-width="1.5"/>
    <text x="26" y="34" font-size="22" font-family="Georgia, serif" fill="#243342">Specimen axes</text>
    <circle cx="104" cy="-30" r="4" fill="#1f2937"/>
    <line x1="104" y1="-30" x2="194" y2="-30" stroke="#b8922c" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="104" y1="-30" x2="44" y2="-108" stroke="#b8922c" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="104" y1="-30" x2="104" y2="-126" stroke="#b8922c" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="202" y="-30" font-size="22" font-family="Georgia, serif" fill="#5b4308">x</text>
    <text x="18" y="-114" font-size="22" font-family="Georgia, serif" fill="#5b4308">y</text>
    <text x="114" y="-132" font-size="22" font-family="Georgia, serif" fill="#5b4308">z</text>
  </g>

  <g transform="translate(920,626)">
    <rect x="0" y="0" width="198" height="54" rx="10" fill="#eef5fb" stroke="#7ba1bf" stroke-width="1.5"/>
    <text x="23" y="34" font-size="22" font-family="Georgia, serif" fill="#243342">Detector frame</text>
    <rect x="24" y="-146" width="132" height="96" rx="10" fill="#dceaf6" stroke="#4e7ea7" stroke-width="2"/>
    <circle cx="90" cy="-98" r="6" fill="#244561"/>
    <line x1="90" y1="-98" x2="138" y2="-98" stroke="#356891" stroke-width="3.5" marker-end="url(#thin-arrow)"/>
    <line x1="90" y1="-98" x2="90" y2="-138" stroke="#356891" stroke-width="3.5" marker-end="url(#thin-arrow)"/>
    <text x="144" y="-98" font-size="18" font-family="Georgia, serif" fill="#17314a">u</text>
    <text x="98" y="-140" font-size="18" font-family="Georgia, serif" fill="#17314a">v</text>
    <text x="46" y="-60" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#17314a">pattern plane</text>
  </g>

  <line x1="360" y1="570" x2="570" y2="570" stroke="#5b6570" stroke-width="2.8" stroke-dasharray="10 8" marker-end="url(#thin-arrow)"/>
  <text x="390" y="552" font-size="18" font-family="Georgia, serif" fill="#4b5563">registration may relate map to specimen</text>

  <line x1="788" y1="570" x2="920" y2="570" stroke="#5b6570" stroke-width="2.8" stroke-dasharray="10 8" marker-end="url(#thin-arrow)"/>
  <text x="794" y="552" font-size="18" font-family="Georgia, serif" fill="#4b5563">geometry relates specimen to detector</text>

  <text x="62" y="728" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#56616d">
    Teaching note: the same numerical orientation data can become ambiguous if these frames are collapsed into a single unlabeled coordinate system.
  </text>
</svg>
