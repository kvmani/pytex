<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <rect width="1100" height="720" fill="#f8fbff"/>
  <text x="60" y="72" font-size="34" font-family="Georgia, serif" fill="#17324a">Dirichlet-Type Fundamental Region In Quaternion Hemisphere</text>
  <text x="60" y="110" font-size="20" font-family="Georgia, serif" fill="#335c7a">schematic: select the symmetry-equivalent quaternion closest to the identity element</text>

  <circle cx="340" cy="380" r="210" fill="#e6f0fb" stroke="#7da8d1" stroke-width="3"/>
  <path d="M340 170 A210 210 0 0 1 548 380" fill="none" stroke="#c84c3a" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M340 170 A210 210 0 0 0 180 500" fill="none" stroke="#c84c3a" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M548 380 A210 210 0 0 1 340 590" fill="none" stroke="#c84c3a" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M180 500 A210 210 0 0 0 340 590" fill="none" stroke="#c84c3a" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M340 170 L548 380 L340 590 L180 500 Z" fill="#fff2e8" stroke="#d07b42" stroke-width="3"/>
  <circle cx="340" cy="170" r="8" fill="#17324a"/>
  <circle cx="548" cy="380" r="8" fill="#17324a"/>
  <circle cx="340" cy="590" r="8" fill="#17324a"/>
  <circle cx="180" cy="500" r="8" fill="#17324a"/>
  <circle cx="340" cy="380" r="10" fill="#17324a"/>
  <text x="356" y="372" font-size="22" font-family="Georgia, serif" fill="#17324a">identity q = (1, 0, 0, 0)</text>
  <text x="265" y="152" font-size="20" font-family="Georgia, serif" fill="#17324a">bisector face</text>
  <text x="562" y="386" font-size="20" font-family="Georgia, serif" fill="#17324a">bisector face</text>
  <text x="350" y="620" font-size="20" font-family="Georgia, serif" fill="#17324a">bisector face</text>
  <text x="64" y="542" font-size="20" font-family="Georgia, serif" fill="#17324a">exact PyTex region selector:</text>
  <text x="64" y="574" font-size="20" font-family="Georgia, serif" fill="#17324a">choose the orbit element with maximal canonical scalar part q₀</text>
  <text x="64" y="606" font-size="20" font-family="Georgia, serif" fill="#17324a">tie surfaces are quaternion-space bisectors between symmetry copies</text>

  <rect x="670" y="170" width="360" height="320" rx="18" fill="#ffffff" stroke="#7da8d1" stroke-width="3"/>
  <text x="700" y="220" font-size="26" font-family="Georgia, serif" fill="#17324a">Exact orbit criterion</text>
  <text x="700" y="270" font-size="22" font-family="Georgia, serif" fill="#17324a">For q and crystal symmetry c:</text>
  <text x="730" y="316" font-size="26" font-family="Georgia, serif" fill="#17324a">q′ = q · c</text>
  <text x="700" y="364" font-size="22" font-family="Georgia, serif" fill="#17324a">Pick q′ with largest q′₀</text>
  <text x="700" y="404" font-size="22" font-family="Georgia, serif" fill="#17324a">equivalently smallest rotation angle</text>
  <text x="700" y="444" font-size="22" font-family="Georgia, serif" fill="#17324a">ω = 2 arccos(|q′₀|)</text>

  <text x="60" y="674" font-size="18" font-family="Georgia, serif" fill="#4d6478">The drawn polyhedron is schematic. The implemented contract is the exact Dirichlet-type selection rule on the quaternion hemisphere.</text>
</svg>
