<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="1040" height="620" fill="#fcfcfa"/>
  <text x="40" y="50" font-size="30" font-family="Georgia, serif" fill="#111827">Canonical HCP Reference Frame</text>
  <text x="40" y="84" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#374151">
    PyTex fixes the crystal frame with a1 along +x, a2 at 120° in the basal plane, and c along +z.
  </text>

  <circle cx="310" cy="360" r="150" fill="none" stroke="#7a9e6f" stroke-width="4"/>
  <line x1="310" y1="360" x2="470" y2="360" stroke="#1f2937" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="310" y1="360" x2="230" y2="222" stroke="#1f2937" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="310" y1="360" x2="230" y2="498" stroke="#1f2937" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="310" y1="360" x2="310" y2="150" stroke="#8b5cf6" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="482" y="368" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#111827">a1</text>
  <text x="182" y="215" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#111827">a2</text>
  <text x="182" y="520" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#111827">a3 = -(a1 + a2)</text>
  <text x="322" y="142" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#5b3b9b">c</text>

  <path d="M310 360 A70 70 0 0 1 248 240" fill="none" stroke="#c27803" stroke-width="4"/>
  <text x="214" y="300" font-size="20" font-family="Helvetica, Arial, sans-serif" fill="#8a5200">120°</text>

  <rect x="590" y="170" width="360" height="260" rx="20" fill="#eef3f8" stroke="#356891" stroke-width="2"/>
  <text x="620" y="214" font-size="24" font-family="Georgia, serif" fill="#17304a">Notation fixed in docs and code</text>
  <text x="620" y="258" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#17304a">3-index direct-space direction: [u v w]</text>
  <text x="620" y="292" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#17304a">4-index Weber direction: [U V T W]</text>
  <text x="620" y="326" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#17304a">Constraint: U + V + T = 0</text>
  <text x="620" y="360" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#17304a">Plane notation: (h k i l), i = -(h + k)</text>
  <text x="620" y="394" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#17304a">Internal storage remains canonical 3-component</text>

  <text x="40" y="575" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#4b5563">
    Normative sources: De Graef (2003); International Tables for Crystallography, Volume A.
  </text>
</svg>
