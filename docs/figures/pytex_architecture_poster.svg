<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">PyTex Architecture Poster</title>
  <desc id="desc">A poster-style overview of the PyTex architecture showing governance, canonical core, domain modules, boundary layers, and future foundations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2740"/>
      <stop offset="100%" stop-color="#204f7a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#102a43" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#486581"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="90" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="#ffffff">PyTex Architecture Atlas</text>
  <text x="90" y="132" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#d9e7f5">
    One canonical crystallographic core, multiple scientific domains, explicit governance, and architecture-first expansion.
  </text>

  <rect x="80" y="180" rx="28" ry="28" width="1440" height="720" fill="url(#panel)" filter="url(#shadow)"/>

  <rect x="120" y="220" rx="20" ry="20" width="1360" height="96" fill="#102a43"/>
  <text x="150" y="273" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#f0f4f8">
    Governance And Product Surfaces
  </text>
  <text x="150" y="307" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#d9e2ec">
    Mission, specifications, standards, Sphinx docs, LaTeX theory notes, SVG figures, tests, ledgers, fixtures, and benchmarks.
  </text>

  <rect x="160" y="362" rx="22" ry="22" width="480" height="260" fill="#eff6ff" stroke="#486581" stroke-width="3"/>
  <text x="190" y="410" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#102a43">Canonical Core</text>
  <text x="190" y="450" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#334e68">conventions.py</text>
  <text x="190" y="485" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#334e68">frames.py</text>
  <text x="190" y="520" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#334e68">symmetry.py</text>
  <text x="190" y="555" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#334e68">lattice.py</text>
  <text x="190" y="590" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#334e68">orientation.py / provenance.py</text>

  <rect x="720" y="348" rx="22" ry="22" width="330" height="140" fill="#dcfce7" stroke="#2d6a4f" stroke-width="3"/>
  <text x="750" y="394" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1b4332">Texture</text>
  <text x="750" y="430" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#1b4332">PF, IPF, ODF, kernels</text>

  <rect x="1090" y="348" rx="22" ry="22" width="330" height="140" fill="#dcfce7" stroke="#2d6a4f" stroke-width="3"/>
  <text x="1120" y="394" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1b4332">EBSD</text>
  <text x="1120" y="430" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#1b4332">CrystalMap, KAM, grains, GROD</text>

  <rect x="720" y="528" rx="22" ry="22" width="330" height="140" fill="#dcfce7" stroke="#2d6a4f" stroke-width="3"/>
  <text x="750" y="574" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1b4332">Diffraction</text>
  <text x="750" y="610" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#1b4332">Geometry, spots, families, indexing</text>

  <rect x="1090" y="528" rx="22" ry="22" width="330" height="140" fill="#dcfce7" stroke="#2d6a4f" stroke-width="3"/>
  <text x="1120" y="574" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1b4332">Plotting</text>
  <text x="1120" y="610" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#1b4332">IPF color keys and presentation aids</text>

  <rect x="160" y="700" rx="22" ry="22" width="400" height="140" fill="#fff7d6" stroke="#b7791f" stroke-width="3"/>
  <text x="190" y="746" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#744210">Boundary Layer</text>
  <text x="190" y="782" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#744210">Adapters normalize external tools and data</text>

  <rect x="600" y="700" rx="22" ry="22" width="400" height="140" fill="#fff7d6" stroke="#b7791f" stroke-width="3"/>
  <text x="630" y="746" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#744210">Experimental Layer</text>
  <text x="630" y="782" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#744210">Unstable research methods build downstream</text>

  <rect x="1040" y="700" rx="22" ry="22" width="380" height="140" fill="#fde2e4" stroke="#b56576" stroke-width="3"/>
  <text x="1070" y="746" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#6d1f2f">Next Foundations</text>
  <text x="1070" y="782" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#6d1f2f">Multimodal acquisition and phase transformation</text>

  <line x1="640" y1="492" x2="720" y2="418" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="492" x2="720" y2="598" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="492" x2="1090" y2="418" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="492" x2="1090" y2="598" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="360" y1="622" x2="360" y2="700" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="622" x2="800" y2="700" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1220" y1="668" x2="1220" y2="700" stroke="#b56576" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="120" y="940" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#d9e7f5">
    Semantic nucleus: one shared crystallographic core. Product rule: documentation and validation are part of completion.
  </text>
</svg>
