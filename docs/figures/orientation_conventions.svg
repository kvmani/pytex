<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#233241"/>
    </marker>
  </defs>
  <rect width="1120" height="620" fill="#fffdf8"/>
  <text x="44" y="54" font-size="30" font-family="Georgia, serif" fill="#16202c">Orientation Conventions In PyTex</text>
  <text x="44" y="86" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#475569">
    Canonical public semantics: explicit Euler convention labels plus canonical quaternion storage in (w, x, y, z) order.
  </text>

  <rect x="58" y="140" width="296" height="196" rx="24" fill="#dcebd9" stroke="#4c7a57" stroke-width="2.5"/>
  <text x="88" y="182" font-size="24" font-family="Georgia, serif" fill="#183123">Bunge</text>
  <text x="88" y="214" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#183123">public label: `bunge`</text>
  <text x="88" y="242" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#183123">angles: (\u03c61, \u03a6, \u03c62)</text>
  <text x="88" y="270" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#183123">used as the stable convenience path</text>
  <text x="88" y="298" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#183123">for texture-facing workflows</text>

  <rect x="412" y="140" width="296" height="196" rx="24" fill="#f6e9c5" stroke="#a88a2f" stroke-width="2.5"/>
  <text x="442" y="182" font-size="24" font-family="Georgia, serif" fill="#4c3909">Matthies / ABG</text>
  <text x="442" y="214" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#4c3909">public labels: `matthies`, `abg`</text>
  <text x="442" y="242" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#4c3909">same underlying convention family</text>
  <text x="442" y="270" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#4c3909">but explicit naming matters at tool</text>
  <text x="442" y="298" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#4c3909">boundaries and in parity tests</text>

  <rect x="766" y="140" width="296" height="196" rx="24" fill="#e4edf8" stroke="#396890" stroke-width="2.5"/>
  <text x="796" y="182" font-size="24" font-family="Georgia, serif" fill="#17314a">Quaternion storage</text>
  <text x="796" y="228" font-size="36" font-family="Courier New, monospace" fill="#17314a">(w, x, y, z)</text>
  <text x="796" y="264" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#17314a">unit norm enforced</text>
  <text x="796" y="292" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#17314a">canonicalized for parity stability</text>

  <rect x="168" y="420" width="784" height="132" rx="22" fill="#fffaf0" stroke="#d7c7a1" stroke-width="1.8"/>
  <text x="196" y="458" font-size="22" font-family="Georgia, serif" fill="#16202c">Practical rule</text>
  <text x="196" y="492" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#374151">
    Use convention-aware Euler APIs at import or export boundaries and keep rotations internally in canonical quaternion form.
  </text>
  <text x="196" y="520" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#374151">
    This keeps teaching examples readable while preserving a stable scientific representation for parity and workflow composition.
  </text>

  <line x1="354" y1="238" x2="412" y2="238" stroke="#233241" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="708" y1="238" x2="766" y2="238" stroke="#233241" stroke-width="3.5" marker-end="url(#arrow)"/>
</svg>
