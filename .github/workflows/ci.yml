name: ci

on:
  push:
  pull_request:

jobs:
  base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install base lane
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,docs]'
      - name: Repo integrity
        run: python scripts/check_repo_integrity.py
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy src
      - name: Docs build
        run: python -m sphinx -b html docs/site docs/_build/html
      - name: Test
        run: python -m pytest -q

  full-scientific:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install full scientific lane
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,docs,adapters]'
      - name: Repo integrity
        run: python scripts/check_repo_integrity.py
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy src
      - name: Test with optional scientific stack
        run: |
          python -m pytest -q -rs | tee pytest-rs.txt
          ! grep -q "SKIPPED" pytest-rs.txt
