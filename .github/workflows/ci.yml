name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Repo integrity
        run: python scripts/check_repo_integrity.py
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Docs build
        run: |
          python -m pip install -e '.[docs]'
          sphinx-build -b html docs/site docs/_build/html
      - name: Test
        run: pytest
